<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Hole It — Bi-Weekly Brief Tracker</title>
<style>
  :root {
    --bg: #191919;
    --card: #252525;
    --ink: #e9e9e7;
    --muted: #9b9a97;
    --line: #373737;
    --hole: #34d399;
    --screw: #60a5fa;
    --unravel: #c084fc;
    --done: #34d399;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    font-size: 13px;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 14px 14px 14px; }

  .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; align-items: stretch; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .game {
    background: var(--card); border: 1px solid var(--line); border-radius: 12px;
    padding: 12px 13px 5px; border-top: 3px solid var(--accent);
    display: flex; flex-direction: column;
  }
  .ghead { display: flex; align-items: baseline; justify-content: space-between; gap: 8px; }
  .game h2 { margin: 0; font-size: 14px; font-weight: 700; display: flex; align-items: center; gap: 7px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--accent); }
  .gleft { font-size: 11px; color: var(--muted); font-weight: 600; white-space: nowrap; }
  .gsub { font-size: 10.5px; color: var(--muted); font-weight: 600; margin-top: 3px; opacity: .85; }
  .gbar { height: 5px; background: #333; border-radius: 99px; margin: 7px 0 6px; overflow: hidden; }
  .gbar > span { display: block; height: 100%; width: 0; background: var(--accent); border-radius: 99px; transition: width .25s ease; }

  .items { flex: 1 1 auto; }
  .item {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 0; border-top: 1px solid var(--line);
  }
  .item:first-of-type { border-top: none; }
  .item .label { font-size: 12.5px; font-weight: 600; flex: 1 1 auto; min-width: 0; }
  .boxes { display: flex; gap: 4px; flex: 0 0 auto; }
  .box {
    width: 21px; height: 21px; border-radius: 5px; border: 1.5px solid var(--line);
    background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 10.5px; font-weight: 700; color: #6f6f6c; user-select: none; transition: all .12s ease;
  }
  .box:hover { border-color: var(--accent); color: var(--ink); }
  .box.on { background: var(--accent); border-color: var(--accent); color: #0c1a12; }
  .item .left {
    font-size: 11px; font-weight: 700; color: var(--accent);
    background: color-mix(in srgb, var(--accent) 20%, transparent);
    padding: 2px 7px; border-radius: 99px; white-space: nowrap; flex: 0 0 auto;
    min-width: 46px; text-align: center;
  }
  .item .left.done { color: #0c1a12; background: var(--done); }

  .game footer { margin-top: auto; padding: 9px 0 4px; display: flex; justify-content: flex-end; }
  .game footer button { border: none; background: none; color: var(--muted); font: inherit; font-size: 11px; cursor: pointer; text-decoration: underline; opacity: .7; }
  .game footer button:hover { opacity: 1; color: var(--ink); }
  .alldone { color: var(--done); font-weight: 700; }

  .topbar {
    display: flex; align-items: center; gap: 16px;
    margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--line);
  }
  .tb-side { flex: 1 1 0; display: flex; align-items: center; gap: 16px; min-width: 0; }
  .tb-right { justify-content: flex-end; }
  .weektabs { display: flex; gap: 4px; flex: 0 0 auto; background: var(--card); border: 1px solid var(--line); border-radius: 9px; padding: 3px; }
  .weektabs button {
    border: none; background: none; color: var(--muted); font: inherit; font-size: 12.5px; font-weight: 600;
    padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all .12s ease; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .weektabs button .gd { width: 8px; height: 8px; border-radius: 50%; background: currentColor; opacity: .55; }
  .weektabs button:hover { color: var(--ink); }
  .weektabs button.active { background: color-mix(in srgb, var(--tab) 22%, transparent); color: var(--tab); }
  .weektabs button.active .gd { opacity: 1; }
  .topbar .count { font-size: 12.5px; color: var(--muted); }
  .topbar .count b { color: var(--ink); font-size: 14px; }
  button.reset {
    border: 1px solid var(--line); background: var(--card); color: var(--muted);
    border-radius: 8px; padding: 6px 13px; font: inherit; font-size: 12.5px; cursor: pointer; transition: all .15s;
  }
  button.reset:hover { border-color: #555; color: var(--ink); }
  button.reset.arm { border-color: #e5484d; color: #ff7173; }
</style>
</head>
<body>
<div class="wrap">
  <header class="topbar">
    <div class="tb-side"></div>
    <div class="weektabs" id="weektabs"></div>
    <div class="tb-side tb-right">
      <div class="count">This view <b id="overallDone">0</b> / <b id="overallTotal">0</b> done</div>
      <button class="reset" id="resetAll">↺ Reset all</button>
    </div>
  </header>
  <div class="grid" id="grid"></div>
</div>

<script>
// Each game's bi-weekly breakdown, derived from the Creative Requests board
// (Week 1 = 06-25 sweep wave, Week 2 = iteration-grind wave, Monthly = separate cadence).
const W1 = "Week 1 · Monthly + Sweep + Inspiration", W2 = "Week 2 · Iteration Grind";
const GAMES = [
  { key: "hole", name: "Hole It", color: "var(--hole)", weeks: [
    { name: W1, key: "w1", items: [
      { label: "IEC", target: 1 }, { label: "Banner", target: 1 },
      { label: "Iteration (Video)", target: 1 }, { label: "Poolday (Inspiration)", target: 1 },
      { label: "Sonic VO (Inspiration)", target: 1 }, { label: "New Concept (New Idea)", target: 1 },
      { label: "Playable", target: 1 }, { label: "SETT (4 deliveries)", target: 3 } ]},
    { name: W2, key: "w2", items: [
      { label: "Iteration (Video)", target: 5 }, { label: "New Concept (New Idea)", target: 1 },
      { label: "Playable", target: 2 }, { label: "SETT (4 deliveries)", target: 1 } ]},
  ]},
  { key: "screw", name: "Screw Guru", color: "var(--screw)", weeks: [
    { name: W1, key: "w1", items: [
      { label: "IEC", target: 1 }, { label: "Banner", target: 1 },
      { label: "Iteration (Video)", target: 1 }, { label: "Poolday (Inspiration)", target: 1 },
      { label: "New Concept (New Idea)", target: 1 }, { label: "Playable", target: 1 },
      { label: "SETT (4 deliveries)", target: 3 } ]},
    { name: W2, key: "w2", items: [
      { label: "Iteration (Video)", target: 2 }, { label: "Playable", target: 1 },
      { label: "SETT (4 deliveries)", target: 1 } ]},
  ]},
  { key: "unravel", name: "Unravel Master", color: "var(--unravel)", weeks: [
    { name: W1, key: "w1", items: [
      { label: "IEC", target: 1 }, { label: "Banner", target: 1 },
      { label: "Iteration (Video)", target: 1 }, { label: "Poolday (Inspiration)", target: 1 },
      { label: "Sonic VO (Inspiration)", target: 1 }, { label: "New Concept (New Idea)", target: 1 },
      { label: "Playable", target: 1 } ]},
    { name: W2, key: "w2", items: [
      { label: "Iteration (Video)", target: 3 }, { label: "New Concept (New Idea)", target: 1 },
      { label: "Playable", target: 2 } ]},
  ]},
];

// The week toggle — switches which week every game column shows. Built from the
// week keys/names defined per-game above (short label for the tab, full name on the card).
const WEEKS = [
  { key: "w1", tab: "Week 1", color: "var(--hole)" },
  { key: "w2", tab: "Week 2", color: "var(--screw)" },
];

const STORE_KEY = "biweekly_brief_tracker_v2";
let state = load();
if (!WEEKS.some(w => w.key === state.week)) state.week = WEEKS[0].key;

function load() {
  try { return JSON.parse(localStorage.getItem(STORE_KEY)) || { checks: {}, week: WEEKS[0].key }; }
  catch { return { checks: {}, week: WEEKS[0].key }; }
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function itemId(gameKey, weekKey, idx) { return gameKey + ":" + weekKey + ":" + idx; }
function getChecked(id) { return state.checks[id] || 0; }
function setChecked(id, n) { state.checks[id] = n; save(); }

function renderTabs() {
  const tabs = document.getElementById("weektabs");
  tabs.innerHTML = "";
  WEEKS.forEach(w => {
    const b = document.createElement("button");
    b.style.setProperty("--tab", w.color);
    b.className = w.key === state.week ? "active" : "";
    b.style.color = w.key === state.week ? w.color : "";
    b.textContent = w.tab;
    b.onclick = () => { state.week = w.key; save(); renderTabs(); render(); };
    tabs.appendChild(b);
  });
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  let oDone = 0, oTotal = 0;

  GAMES.forEach(game => {
    const wk = game.weeks.find(w => w.key === state.week);
    let gDone = 0, gTotal = 0;
    const card = document.createElement("div");
    card.className = "game";
    card.style.setProperty("--accent", game.color);

    const head = document.createElement("div");
    head.className = "ghead";
    head.innerHTML = '<h2><span class="dot"></span>' + game.name + '</h2>';
    const gleft = document.createElement("div");
    gleft.className = "gleft";
    head.appendChild(gleft);
    card.appendChild(head);

    const sub = document.createElement("div");
    sub.className = "gsub";
    sub.textContent = wk ? wk.name : "";
    card.appendChild(sub);

    const bar = document.createElement("div");
    bar.className = "gbar";
    const barFill = document.createElement("span");
    bar.appendChild(barFill);
    card.appendChild(bar);

    const itemsWrap = document.createElement("div");
    itemsWrap.className = "items";

    const items = wk ? wk.items : [];
    items.forEach((it, idx) => {
      const id = itemId(game.key, state.week, idx);
      let checked = Math.min(getChecked(id), it.target);
      gTotal += it.target; gDone += checked;

      const item = document.createElement("div");
      item.className = "item";

      const label = document.createElement("span");
      label.className = "label";
      label.textContent = it.label;
      item.appendChild(label);

      const boxes = document.createElement("div");
      boxes.className = "boxes";
      for (let i = 0; i < it.target; i++) {
        const b = document.createElement("div");
        b.className = "box" + (i < checked ? " on" : "");
        b.textContent = i + 1;
        b.onclick = () => {
          const cur = Math.min(getChecked(id), it.target);
          const tgt = i + 1;
          setChecked(id, cur >= tgt ? i : tgt);
          render();
        };
        boxes.appendChild(b);
      }
      item.appendChild(boxes);

      const remaining = it.target - checked;
      const left = document.createElement("span");
      left.className = "left" + (remaining === 0 ? " done" : "");
      left.textContent = remaining === 0 ? "✓" : remaining + " left";
      item.appendChild(left);

      itemsWrap.appendChild(item);
    });
    card.appendChild(itemsWrap);

    gleft.innerHTML = gTotal && gDone === gTotal ? '<span class="alldone">All done ✓</span>' : gDone + ' / ' + gTotal;
    barFill.style.width = (gTotal ? (gDone / gTotal * 100) : 0) + "%";

    const foot = document.createElement("footer");
    const rb = document.createElement("button");
    rb.textContent = "Reset " + game.name + " · this week";
    rb.onclick = () => { items.forEach((_, idx) => setChecked(itemId(game.key, state.week, idx), 0)); render(); };
    foot.appendChild(rb);
    card.appendChild(foot);

    grid.appendChild(card);
    oDone += gDone; oTotal += gTotal;
  });

  document.getElementById("overallDone").textContent = oDone;
  document.getElementById("overallTotal").textContent = oTotal;
}

const resetBtn = document.getElementById("resetAll");
let armed = false, armTimer = null;
function disarm() { armed = false; clearTimeout(armTimer); resetBtn.classList.remove("arm"); resetBtn.textContent = "↺ Reset all"; }
resetBtn.onclick = () => {
  if (!armed) {
    armed = true;
    resetBtn.classList.add("arm");
    resetBtn.textContent = "Click again to reset everything";
    armTimer = setTimeout(disarm, 3000);
    return;
  }
  disarm();
  state.checks = {};
  save();
  render();
};

renderTabs();
render();
</script>
</body>
</html>
